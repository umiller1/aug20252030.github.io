<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Jim's Portfolio</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
            <nav class="sc">
                <a href="#" class="logo">Photos by Jim</a>
                <div class="links">
                    <a href="#">Gallery</a>
                    <a href="#">Services</a>
                    <a href="#">About</a>
                    <a href="#">Contact</a>
                </div>
            </nav>
            <div class="hero sc">
                <div class="ic">
                    <img src="images/hero.jpg" alt="pic.">
                </div>
                <div class="cont">
                    <h1>Photos by Jim</h1>
                    <a href="#gal" class="btn">View Gallery</a>
                </div>
            </div>
        </header>
        <main>
            <section id="gal">
                <h2 class="sc">Gallery</h2>
                <div class="sc">
                    <aside>
                        <h3>Experiences</h3>
                        <ul>
                            <li><a href="#">Maine, USA</a></li>
                            <li><a href="#">Tokyo, JP</a></li>
                            <li><a href="#">Copenhagen, DK</a></li>
                            <li><a href="#">Yaoundé, CM</a></li>
                            <li><a href="#">Shanghai, CN</a></li>
                        </ul>
                    </aside>
                    <div class="gallery">
                        <div class="ic">
                            <img src="images/gal1.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal2.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal3.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal4.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal5.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal6.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal7.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal8.jpg" alt="pic.">
                        </div>
                        <div class="ic">
                            <img src="images/gal9.jpg" alt="pic.">
                        </div>
                    </div>
                </div>
            </section>
            <section class="card-section">
                <div class="sc">
                    <div id="c1" class="card">
                        <div>
                            <h2>About</h2>
                            <a href="#" class="btn">Learn More</a>
                        </div>
                    </div>
                    <div id="c2" class="card">
                        <div>
                            <h2>Services</h2>
                            <a href="#" class="btn">View Rates</a>
                        </div>
                    </div>
                    <div id="c3" class="card">
                        <div>
                            <h2>Contact</h2>
                            <a href="#" class="btn">Reach Out</a>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <footer>
            <p>All Righs Reserved &copy; 2026 - Jim</p>
        </footer>
    </body>
</html>
